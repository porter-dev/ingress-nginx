name: Build and push ingress-nginx images

on:
  schedule:
    - cron: '0 3 * * 2'
  workflow_dispatch:
    inputs:
      fork_repo:
        description: 'Fork repository (owner/repo)'
        required: false
        default: 'chainguard-forks/ingress-nginx'
      docker_org:
        description: 'Docker Hub organization/username (defaults to the DOCKERHUB_USERNAME secret)'
        required: false
        default: 'porterhub'

env:
  REGISTRY: docker.io
  GHCR_REGISTRY: ghcr.io
  DOCKER_ORG: ${{ github.event.inputs.docker_org || secrets.DOCKERHUB_USERNAME }}
  GHCR_ORG: ${{ github.repository_owner }}
  FORK_REPO: ${{ github.event.inputs.fork_repo || 'chainguard-forks/ingress-nginx' }}

jobs:
  build-and-push:
    name: "Build chainguard/ingress-nginx@${{ matrix.app_version }} | ${{ matrix.chart_version }}"
    runs-on: warp-ubuntu-latest-x64-4x
    strategy:
      matrix:
        include:
          - app_version: '1.11.5'
            chart_version: '4.11.5'
            upstream_chart_tag: 'helm-chart-4.11.5'
          - app_version: '1.12.1'
            chart_version: '4.12.1'
            upstream_chart_tag: 'helm-chart-4.12.1'
          - app_version: '1.12.8'
            chart_version: '4.12.8'
            upstream_chart_tag: 'helm-chart-4.12.8'
          - app_version: '1.13.0'
            chart_version: '4.13.0'
            upstream_chart_tag: 'helm-chart-4.13.0'
          - app_version: '1.13.1'
            chart_version: '4.13.1'
            upstream_chart_tag: 'helm-chart-4.13.1'
          - app_version: '1.13.2'
            chart_version: '4.13.2'
            upstream_chart_tag: 'helm-chart-4.13.2'
          - app_version: '1.13.3'
            chart_version: '4.13.3'
            upstream_chart_tag: 'helm-chart-4.13.3'
          - app_version: '1.13.4'
            chart_version: '4.13.4'
            upstream_chart_tag: 'helm-chart-4.13.4'
          - app_version: '1.14.0'
            chart_version: '4.14.0'
            upstream_chart_tag: 'helm-chart-4.14.0'
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout the fork repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FORK_REPO }}
          ref: ${{ matrix.upstream_chart_tag }}
        
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        run: |
          if [ -f TAG ]; then
            VERSION=$(cat TAG)
          else
            VERSION="${GITHUB_SHA::8}"
          fi
          
          if [[ "${{ matrix.upstream_chart_tag }}" =~ ^v[0-9] ]]; then
            VERSION="${{ matrix.upstream_chart_tag }}"
          fi
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
      
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'GOLANG_VERSION'
          
      - name: Install mage
        run: go install github.com/magefile/mage@latest
        
      - name: Build and push images to Docker Hub
        env:
          TAG: ${{ steps.meta.outputs.version }}
          REGISTRY: ${{ env.REGISTRY }}/${{ env.DOCKER_ORG }}
        run: |
          echo "Building from fork: ${{ env.FORK_REPO }}@${{ matrix.upstream_chart_tag }}"
          echo "Pushing to: ${REGISTRY}"
          
          make release
      
      - name: Retag and push images to GHCR
        env:
          TAG: ${{ steps.meta.outputs.version }}
          DOCKERHUB_PREFIX: ${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKER_ORG }}
          GHCR_PREFIX: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_ORG }}
        run: |
          for IMAGE in controller controller-chroot; do
            docker buildx imagetools create \
              --tag ${GHCR_PREFIX}/${IMAGE}:${TAG} \
              ${DOCKERHUB_PREFIX}/${IMAGE}:${TAG}
          done
      
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'
      
      - name: Log in to Docker Hub with Helm
        run: |
          echo "${{ secrets.DOCKERHUB_PASSWORD }}" | helm registry login registry-1.docker.io \
            --username ${{ secrets.DOCKERHUB_USERNAME }} \
            --password-stdin
      
      - name: Package and push Helm chart
        env:
          CHART_VERSION: ${{ matrix.chart_version }}
          DOCKER_ORG: ${{ env.DOCKER_ORG }}
        run: |
          # Navigate to the chart directory
          cd charts/ingress-nginx
          
          # Package the chart
          helm package . --version ${CHART_VERSION}
          
          # Push to Docker Hub as OCI artifact
          helm push ingress-nginx-${CHART_VERSION}.tgz oci://registry-1.docker.io/${DOCKER_ORG}
          
          echo "Pushed Helm chart to oci://registry-1.docker.io/${DOCKER_ORG}/ingress-nginx:${CHART_VERSION}"

      - name: Generate build summary
        run: |
          VERSION=${{ steps.meta.outputs.version }}
          REGISTRY=${{ env.REGISTRY }}/${{ env.DOCKER_ORG }}
          
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Source:** \`${{ env.FORK_REPO }}@${{ matrix.upstream_chart_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** ${{ steps.meta.outputs.date }}" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Org:** \`${{ env.DOCKER_ORG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Built Images" >> $GITHUB_STEP_SUMMARY
          echo "- \`${REGISTRY}/controller:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${REGISTRY}/controller-chroot:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Packaged Charts" >> $GITHUB_STEP_SUMMARY
          echo "- \`oci://registry-1.docker.io/${DOCKER_ORG}/ingress-nginx:${CHART_VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Helm Override Example" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "helm upgrade --install oci://registry-1.docker.io/porterhub/ingress-nginx:VERSION \\" >> $GITHUB_STEP_SUMMARY
          echo "  --namespace ingress-nginx --create-namespace \\" >> $GITHUB_STEP_SUMMARY
          echo "  --set controller.image.registry=docker.io \\" >> $GITHUB_STEP_SUMMARY
          echo "  --set controller.image.image=${REGISTRY#*/}/controller \\" >> $GITHUB_STEP_SUMMARY
          echo "  --set controller.image.tag=${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
