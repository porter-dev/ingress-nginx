name: Build and Push ingress-nginx Images from Fork

on:
  workflow_dispatch:
    inputs:
      fork_repo:
        description: 'Fork repository (owner/repo)'
        required: false
        default: 'chainguard-forks/ingress-nginx'
      fork_ref:
        description: 'Branch, tag, or commit to build (e.g., main, v1.14.1)'
        required: false
        default: 'helm-chart-4.12.1'
      docker_org:
        description: 'Docker Hub organization/username (defaults to DOCKERHUB_USERNAME secret)'
        required: false
        default: ''

env:
  REGISTRY: docker.io
  DOCKER_ORG: ${{ github.event.inputs.docker_org || secrets.DOCKERHUB_USERNAME }}
  FORK_REPO: ${{ github.event.inputs.fork_repo || 'chainguard-forks/ingress-nginx' }}
  FORK_REF: ${{ github.event.inputs.fork_ref || 'main' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      
    steps:
      - name: Checkout the fork repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FORK_REPO }}
          ref: ${{ env.FORK_REF }}
        
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      
      - name: Extract metadata
        id: meta
        run: |
          # Get version from TAG file or use commit SHA
          if [ -f TAG ]; then
            VERSION=$(cat TAG)
          else
            VERSION="${GITHUB_SHA::8}"
          fi
          
          # For manual workflow dispatch with specific ref
          if [[ "${{ env.FORK_REF }}" =~ ^v[0-9] ]]; then
            VERSION="${{ env.FORK_REF }}"
          fi
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "fork_repo=${{ env.FORK_REPO }}" >> $GITHUB_OUTPUT
          echo "fork_ref=${{ env.FORK_REF }}" >> $GITHUB_OUTPUT
      
      - name: Get NGINX base image
        id: nginx_base
        run: |
          if [ -f NGINX_BASE ]; then
            NGINX_BASE=$(cat NGINX_BASE)
          else
            NGINX_BASE="alpine:3.20"
          fi
          echo "nginx_base=${NGINX_BASE}" >> $GITHUB_OUTPUT
      
      - name: Build and push controller image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./rootfs/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.DOCKER_ORG }}/ingress-nginx-controller:${{ steps.meta.outputs.version }}
          build-args: |
            BASE_IMAGE=${{ steps.nginx_base.outputs.nginx_base }}
            VERSION=${{ steps.meta.outputs.version }}
      
      - name: Build and push controller-chroot image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./images/nginx/rootfs/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.DOCKER_ORG }}/ingress-nginx-controller-chroot:${{ steps.meta.outputs.version }}
          build-args: |
            BASE_IMAGE=${{ steps.nginx_base.outputs.nginx_base }}
            VERSION=${{ steps.meta.outputs.version }}
          
      - name: Generate build summary
        run: |
          VERSION=${{ steps.meta.outputs.version }}
          REGISTRY=${{ env.REGISTRY }}/${{ env.DOCKER_ORG }}
          
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Source:** \`${{ env.FORK_REPO }}@${{ env.FORK_REF }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** ${{ steps.meta.outputs.date }}" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Org:** \`${{ env.DOCKER_ORG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Built Images" >> $GITHUB_STEP_SUMMARY
          echo "- \`${REGISTRY}/ingress-nginx-controller:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${REGISTRY}/ingress-nginx-controller-chroot:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Helm Override Example" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "helm upgrade --install ingress-nginx ingress-nginx \\" >> $GITHUB_STEP_SUMMARY
          echo "  --repo https://kubernetes.github.io/ingress-nginx \\" >> $GITHUB_STEP_SUMMARY
          echo "  --namespace ingress-nginx --create-namespace \\" >> $GITHUB_STEP_SUMMARY
          echo "  --set controller.image.registry=${REGISTRY%/*} \\" >> $GITHUB_STEP_SUMMARY
          echo "  --set controller.image.image=${REGISTRY#*/}/ingress-nginx-controller \\" >> $GITHUB_STEP_SUMMARY
          echo "  --set controller.image.tag=${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY